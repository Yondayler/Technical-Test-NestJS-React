<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="HypeBoard — Videos tech rankeados por engagement real, no por views." />
    <title>HypeBoard</title>

    <!--
      Aplica el tema ANTES de que React renderice para evitar el flash
      de tema (FOUC - Flash Of Unstyled Content).
      Lee localStorage o usa prefers-color-scheme como fallback.
    -->
    <script>
      (function () {
        var stored = localStorage.getItem('hype-theme');
        var theme =
          stored === 'dark' || stored === 'light'
            ? stored
            : window.matchMedia('(prefers-color-scheme: dark)').matches
            ? 'dark'
            : 'light';
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
